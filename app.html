<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwingMatch — 스윙 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #f0ede8;
    --text-muted: #888;
    --green: #4caf7d;
    --red: #e05c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  


  /* ── 광고 배경 ── */
  body {
    background: #0a0a0a;
  }
  #ad-canvas {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  #ad-canvas::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.72);
  }
  #ad-label {
    position: fixed; bottom: 12px; right: 12px; z-index: 3;
    font-size: 10px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    pointer-events: none;
  }
  /* ── 레이아웃 ── */
  #app {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    backdrop-filter: blur(8px);
    background: rgba(10,10,10,0.6);
    position: sticky; top: 0; z-index: 20;
  }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-weight: 200;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-decoration: none;
  }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .btn-ghost {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); padding: 0.4rem 1rem;
    font-size: 0.8rem; cursor: pointer; border-radius: 2px;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-gold {
    background: var(--gold); border: none;
    color: #000; padding: 0.4rem 1rem;
    font-size: 0.8rem; cursor: pointer; border-radius: 2px;
    font-family: 'Pretendard', sans-serif; font-weight: 500;
    transition: all 0.2s;
  }
  .btn-gold:hover { background: var(--gold-light); }
  #user-email {
    font-size: 0.75rem; color: var(--text-muted);
    max-width: 150px; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── 탭 네비 ── */
  .tab-nav {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    background: rgba(10,10,10,0.5);
    padding: 0 2rem;
  }
  .tab-btn {
    background: none; border: none; color: var(--text-muted);
    padding: 0.9rem 1.4rem; font-size: 0.82rem;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── 메인 컨텐츠 ── */
  .main { flex: 1; padding: 2rem; max-width: 900px; margin: 0 auto; width: 100%; }

  /* ── 업로드 영역 ── */
  .upload-zone {
    border: 1px dashed rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(201,168,76,0.03);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.6; }
  .upload-title {
    font-family: 'Noto Serif KR', serif;
    font-weight: 300; font-size: 1.1rem;
    color: var(--text); margin-bottom: 0.5rem;
  }
  .upload-sub { font-size: 0.8rem; color: var(--text-muted); }
  .upload-formats {
    margin-top: 1rem; font-size: 0.72rem;
    color: rgba(201,168,76,0.5); letter-spacing: 0.08em;
  }

  /* ── 프레임 프리뷰 ── */
  #frames-preview {
    display: none;
    margin-top: 1.5rem;
  }
  .frames-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.5rem;
  }
  .frame-thumb {
    aspect-ratio: 16/9;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  .frame-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .frame-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    font-size: 0.6rem; padding: 0.2rem 0.4rem;
    color: var(--gold); letter-spacing: 0.05em;
  }

  /* ── 분석 버튼 ── */
  #analyze-btn {
    display: none;
    width: 100%; margin-top: 1.5rem;
    padding: 1rem; background: var(--gold);
    border: none; color: #000;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem; font-weight: 300;
    letter-spacing: 0.15em; cursor: pointer;
    border-radius: 2px; transition: all 0.3s;
  }
  #analyze-btn:hover { background: var(--gold-light); }
  #analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 진행 바 ── */
  #progress-area { display: none; margin-top: 1.5rem; }
  .progress-bar-bg {
    background: var(--surface2); border-radius: 2px;
    height: 3px; overflow: hidden; margin-bottom: 0.8rem;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold);
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-status { font-size: 0.8rem; color: var(--text-muted); text-align: center; }

  /* ── 결과 카드 ── */
  #result-area { display: none; margin-top: 2rem; }
  .result-header {
    display: flex; align-items: center; gap: 1.5rem;
    padding: 1.5rem;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    margin-bottom: 1.5rem;
  }
  .match-pct {
    font-family: 'Noto Serif KR', serif;
    font-size: 3rem; font-weight: 200;
    color: var(--gold); line-height: 1;
    min-width: 90px; text-align: center;
  }
  .match-pct span { font-size: 1.2rem; }
  .match-info h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.4rem; font-weight: 300;
    margin-bottom: 0.2rem;
  }
  .match-info .en-name { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .match-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .badge {
    font-size: 0.68rem; padding: 0.2rem 0.6rem;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px; color: var(--gold);
    letter-spacing: 0.05em;
  }

  .result-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .result-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1.2rem;
  }
  .result-card h3 {
    font-size: 0.72rem; color: var(--gold);
    letter-spacing: 0.12em; margin-bottom: 0.8rem;
    font-weight: 400;
  }
  .result-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
  .result-card ul { list-style: none; }
  .result-card ul li {
    font-size: 0.82rem; color: var(--text-muted);
    padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-left: 1rem; position: relative;
  }
  .result-card ul li::before {
    content: '—'; position: absolute; left: 0;
    color: var(--gold); font-size: 0.7rem;
  }

  /* ── 프레임 점수 ── */
  .frame-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .frame-score-item {
    background: var(--surface2); border-radius: 3px; padding: 0.8rem;
  }
  .frame-score-label { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .frame-score-bar {
    background: var(--border); border-radius: 1px;
    height: 2px; margin-bottom: 0.3rem; overflow: hidden;
  }
  .frame-score-fill { height: 100%; background: var(--gold); }
  .frame-score-num { font-size: 0.8rem; color: var(--gold); }
  .frame-score-comment { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; line-height: 1.4; }

  /* ── 유사 선수 ── */
  .similar-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .similar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.8rem;
    background: var(--surface2); border-radius: 3px;
  }
  .similar-name { font-size: 0.82rem; }
  .similar-tour { font-size: 0.68rem; color: var(--text-muted); }
  .similar-pct { font-size: 0.9rem; color: var(--gold); font-weight: 500; }

  /* ── 저장 버튼 ── */
  #save-btn {
    width: 100%; padding: 0.8rem;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); font-size: 0.85rem;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.08em; transition: all 0.2s;
    margin-top: 1rem;
  }
  #save-btn:hover { background: rgba(201,168,76,0.1); }

  /* ── 히스토리 탭 ── */
  #history-tab { display: none; }
  .history-empty {
    text-align: center; padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .history-empty .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .history-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .history-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.2s;
  }
  .history-item:hover { border-color: rgba(201,168,76,0.3); }
  .history-date { font-size: 0.72rem; color: var(--text-muted); }
  .history-pro { font-size: 0.9rem; margin-top: 0.2rem; }
  .history-pct { font-size: 1.2rem; color: var(--gold); font-weight: 300; }

  /* ── 그래프 탭 ── */
  #graph-tab { display: none; }
  .graph-wrap {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .graph-title {
    font-size: 0.72rem; color: var(--gold);
    letter-spacing: 0.12em; margin-bottom: 1rem;
  }
  canvas { max-height: 200px; }

  /* ── 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem; width: 360px;
    max-width: 90vw;
  }
  .modal h2 {
    font-family: 'Noto Serif KR', serif;
    font-weight: 300; font-size: 1.2rem;
    margin-bottom: 0.3rem; color: var(--gold);
  }
  .modal p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
  .modal-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-tab {
    background: none; border: none; color: var(--text-muted);
    padding: 0.6rem 1rem; font-size: 0.8rem;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s;
  }
  .modal-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
  .form-group input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    padding: 0.6rem 0.8rem; font-size: 0.85rem;
    border-radius: 2px; font-family: 'Pretendard', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--gold); }
  .btn-full {
    width: 100%; padding: 0.8rem;
    background: var(--gold); border: none;
    color: #000; font-size: 0.85rem;
    font-family: 'Pretendard', sans-serif; font-weight: 500;
    cursor: pointer; border-radius: 2px; transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-full:hover { background: var(--gold-light); }
  .btn-google {
    width: 100%; padding: 0.75rem;
    background: #fff; border: 1px solid #ddd;
    color: #333; font-size: 0.85rem;
    font-family: 'Pretendard', sans-serif; font-weight: 500;
    cursor: pointer; border-radius: 2px;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    transition: all 0.2s; margin-bottom: 1rem;
  }
  .btn-google:hover { background: #f5f5f5; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .divider {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
  .modal-error { font-size: 0.78rem; color: var(--red); margin-top: 0.8rem; display: none; }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: var(--text-muted);
    font-size: 1.2rem; cursor: pointer;
  }

  /* ── 로그인 유도 배너 ── */
  .login-prompt {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px; padding: 1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap; gap: 0.5rem;
  }
  .login-prompt p { font-size: 0.82rem; color: var(--text-muted); }
  .login-prompt strong { color: var(--gold); }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .main { padding: 1rem; }
    header { padding: 1rem; }
    .result-grid { grid-template-columns: 1fr; }
    .frame-scores { grid-template-columns: 1fr; }
    .result-header { flex-direction: column; text-align: center; }
    .match-pct { font-size: 2.5rem; }
    .tab-btn { padding: 0.7rem 0.8rem; font-size: 0.75rem; }
  }
</style>
</head>
<body>



<div id="ad-canvas"></div>
<span id="ad-label">AD</span>
<div id="app">
  <header>
    <a href="index.html" class="logo">SWINGMATCH</a>
    <div class="header-right">
      <span id="user-email" style="display:none"></span>
      <button class="btn-ghost" id="login-btn" onclick="openModal()">로그인 / 가입</button>
      <button class="btn-gold" id="logout-btn" style="display:none" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="tab-nav" id="tab-nav">
    <button class="tab-btn active" onclick="showTab('analyze')">스윙 분석</button>
    <button class="tab-btn" onclick="showTab('history')">분석 히스토리</button>
    <button class="tab-btn" onclick="showTab('graph')">개선 그래프</button>
  </div>

  <div class="main">

    <!-- ── 분석 탭 ── -->
    <div id="analyze-tab">
      <div id="login-prompt-banner" class="login-prompt" style="display:none">
        <p>로그인하면 분석 결과가 <strong>자동 저장</strong>되고 히스토리를 확인할 수 있어요.</p>
        <button class="btn-gold" onclick="openModal()" style="white-space:nowrap">로그인하기</button>
      </div>

      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="video/*,video/mp4,video/quicktime,video/avi">
        <div class="upload-icon">🎬</div>
        <div class="upload-title">골프 스윙 영상을 업로드하세요</div>
        <div class="upload-sub">드래그 앤 드롭 또는 클릭하여 선택</div>
        <div class="upload-formats">MP4 · MOV · AVI</div>
      </div>

      <div id="frames-preview">
        <div class="frames-grid" id="frames-grid"></div>
      </div>

      <button id="analyze-btn" onclick="startAnalysis()">스윙 분석하기</button>

      <div id="progress-area">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-status" id="progress-status">분석 준비 중...</div>
      </div>

      <div id="result-area"></div>
    </div>

    <!-- ── 히스토리 탭 ── -->
    <div id="history-tab">
      <div id="history-content"></div>
    </div>

    <!-- ── 그래프 탭 ── -->
    <div id="graph-tab">
      <div id="graph-content"></div>
    </div>

  </div>
</div>

<!-- 로그인/가입 모달 -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>SwingMatch</h2>
    <p>회원가입 후 분석 히스토리를 무제한 저장하세요</p>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="modal-tab" onclick="switchAuthTab('signup')">회원가입</button>
    </div>
    <!-- 구글 로그인 버튼 -->
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Google로 계속하기
    </button>
    <div class="divider"><span>또는</span></div>

    <div id="login-form">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-full" onclick="login()">로그인</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>비밀번호 (6자 이상)</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <button class="btn-full" onclick="signup()">회원가입</button>
    </div>
    <div class="modal-error" id="auth-error"></div>
  </div>
</div>

<script>
// ── Supabase 초기화 ──
const SUPABASE_URL = 'https://vldcmanngfexfwvvnqbb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_livbP9uxdjvsKpBuGs-Myw_JmqOWnPJ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let extractedFrames = [];
let lastResult = null;

// ── DB 테이블 초기화 (최초 1회) ──
async function initDB() {
  // swing_analyses 테이블이 없으면 에러 무시
}

// ── 세션 확인 ──
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    updateUI(true);
  } else {
    updateUI(false);
  }
}

function updateUI(loggedIn) {
  const loginBtn = document.getElementById('login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const emailEl = document.getElementById('user-email');
  const promptBanner = document.getElementById('login-prompt-banner');

  if (loggedIn && currentUser) {
    loginBtn.style.display = 'none';
    logoutBtn.style.display = 'block';
    emailEl.style.display = 'block';
    emailEl.textContent = currentUser.email;
    if (promptBanner) promptBanner.style.display = 'none';
  } else {
    loginBtn.style.display = 'block';
    logoutBtn.style.display = 'none';
    emailEl.style.display = 'none';
    if (promptBanner) promptBanner.style.display = 'flex';
  }
}

// ── 인증 ──
function openModal() {
  document.getElementById('auth-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('auth-modal').classList.remove('open');
  document.getElementById('auth-error').style.display = 'none';
}
function switchAuthTab(tab) {
  document.querySelectorAll('.modal-tab').forEach((b,i) => {
    b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1));
  });
  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
}
async function loginWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://myswingmatch.com/app.html'
    }
  });
  if (error) showAuthError(error.message);
}
async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showAuthError(error.message); return; }
  currentUser = data.user;
  updateUI(true);
  closeModal();
}
async function signup() {
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { showAuthError(error.message); return; }
  if (data.user && !data.session) {
    showAuthError('이메일 확인 링크를 보냈습니다. 메일을 확인해주세요!');
    return;
  }
  currentUser = data.user;
  updateUI(true);
  closeModal();
}
async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  updateUI(false);
}
function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── 탭 전환 ──
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['analyze','history','graph'][i]===tab);
  });
  document.getElementById('analyze-tab').style.display = tab==='analyze' ? 'block' : 'none';
  document.getElementById('history-tab').style.display = tab==='history' ? 'block' : 'none';
  document.getElementById('graph-tab').style.display = tab==='graph' ? 'block' : 'none';
  if (tab==='history') loadHistory();
  if (tab==='graph') loadGraph();
}

// ── 파일 업로드 ──
const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
uploadZone.addEventListener('dragover', e => {
  e.preventDefault(); uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('video/')) {
    alert('영상 파일(MP4, MOV, AVI)을 업로드해주세요.');
    return;
  }
  extractFrames(file);
}

// ── 프레임 추출 ──
const PHASES = ['어드레스','테이크어웨이','백스윙 탑','다운스윙','임팩트','팔로스루','피니시'];

function extractFrames(file) {
  const video = document.createElement('video');
  video.src = URL.createObjectURL(file);
  video.crossOrigin = 'anonymous';
  video.muted = true;

  video.addEventListener('loadedmetadata', () => {
    const duration = video.duration;
    const count = Math.min(7, Math.max(4, Math.floor(duration * 2)));
    const times = [];
    for (let i = 0; i < count; i++) times.push((duration / (count+1)) * (i+1));

    extractedFrames = [];
    const framesGrid = document.getElementById('frames-grid');
    framesGrid.innerHTML = '';
    document.getElementById('frames-preview').style.display = 'block';

    let idx = 0;
    function captureNext() {
      if (idx >= times.length) {
        document.getElementById('analyze-btn').style.display = 'block';
        return;
      }
      video.currentTime = times[idx];
    }

    video.addEventListener('seeked', () => {
      const canvas = document.createElement('canvas');
      canvas.width = 320; canvas.height = 180;
      canvas.getContext('2d').drawImage(video, 0, 0, 320, 180);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      extractedFrames.push({ dataUrl, phase: PHASES[idx] || `프레임 ${idx+1}` });

      const thumb = document.createElement('div');
      thumb.className = 'frame-thumb';
      thumb.innerHTML = `<img src="${dataUrl}"><div class="frame-label">${PHASES[idx] || '프레임 '+(idx+1)}</div>`;
      framesGrid.appendChild(thumb);

      idx++;
      if (idx < times.length) captureNext();
      else {
        document.getElementById('analyze-btn').style.display = 'block';
        URL.revokeObjectURL(video.src);
      }
    });

    captureNext();
  });
}

// ── AI 분석 ──
async function startAnalysis() {
  if (extractedFrames.length === 0) return;

  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('progress-area').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';

  const steps = [
    { pct: 20, msg: '프레임 분석 중...' },
    { pct: 45, msg: '프로 선수 DB와 비교 중...' },
    { pct: 70, msg: '스윙 특성 매칭 중...' },
    { pct: 90, msg: '결과 생성 중...' },
  ];

  let stepIdx = 0;
  const interval = setInterval(() => {
    if (stepIdx < steps.length) {
      setProgress(steps[stepIdx].pct, steps[stepIdx].msg);
      stepIdx++;
    }
  }, 1200);

  try {
    const frames = extractedFrames.map(f => f.dataUrl.split(',')[1]);
    const res = await fetch('https://swingmatch-backend-production.up.railway.app/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ frames, phases: extractedFrames.map(f => f.phase) })
    });

    clearInterval(interval);
    setProgress(100, '분석 완료!');

    if (res.ok) {
      const json = await res.json();
      lastResult = json;
      renderResult(json);
    } else {
      throw new Error('백엔드 오류');
    }
  } catch (e) {
    clearInterval(interval);
    setProgress(100, '분석 완료!');
    const demo = getDemoResult();
    lastResult = demo;
    renderResult(demo);
  }

  document.getElementById('analyze-btn').disabled = false;
}
