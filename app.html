<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwingMatch — 스윙 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #f0ede8;
    --text-muted: #888;
    --green: #4caf7d;
    --red: #e05c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 광고 배경 ── */
  #ad-bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .ad-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .ad-slide.active { opacity: 1; }
  .ad-slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .ad-slide.mobile-only { display: none; }
  @media (max-width: 768px) {
    .ad-slide.desktop-only { display: none; }
    .ad-slide.mobile-only { display: block; }
  }
  #ad-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: rgba(0,0,0,0.72);
  }
  #ad-label {
    position: fixed; bottom: 12px; right: 12px; z-index: 10;
    font-size: 10px; color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em;
  }

  /* ── 레이아웃 ── */
  #app {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    backdrop-filter: blur(8px);
    background: rgba(10,10,10,0.6);
    position: sticky; top: 0; z-index: 20;
  }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-weight: 200;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-decoration: none;
  }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .btn-ghost {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); padding: 0.4rem 1rem;
    font-size: 0.8rem; cursor: pointer; border-radius: 2px;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-gold {
    background: var(--gold); border: none;
    color: #000; padding: 0.4rem 1rem;
    font-size: 0.8rem; cursor: pointer; border-radius: 2px;
    font-family: 'Pretendard', sans-serif; font-weight: 500;
    transition: all 0.2s;
  }
  .btn-gold:hover { background: var(--gold-light); }
  #user-email {
    font-size: 0.75rem; color: var(--text-muted);
    max-width: 150px; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── 탭 네비 ── */
  .tab-nav {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    background: rgba(10,10,10,0.5);
    padding: 0 2rem;
  }
  .tab-btn {
    background: none; border: none; color: var(--text-muted);
    padding: 0.9rem 1.4rem; font-size: 0.82rem;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── 메인 컨텐츠 ── */
  .main { flex: 1; padding: 2rem; max-width: 900px; margin: 0 auto; width: 100%; }

  /* ── 업로드 영역 ── */
  .upload-zone {
    border: 1px dashed rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(201,168,76,0.03);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.6; }
  .upload-title {
    font-family: 'Noto Serif KR', serif;
    font-weight: 300; font-size: 1.1rem;
    color: var(--text); margin-bottom: 0.5rem;
  }
  .upload-sub { font-size: 0.8rem; color: var(--text-muted); }
  .upload-formats {
    margin-top: 1rem; font-size: 0.72rem;
    color: rgba(201,168,76,0.5); letter-spacing: 0.08em;
  }

  /* ── 프레임 프리뷰 ── */
  #frames-preview {
    display: none;
    margin-top: 1.5rem;
  }
  .frames-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.5rem;
  }
  .frame-thumb {
    aspect-ratio: 16/9;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  .frame-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .frame-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    font-size: 0.6rem; padding: 0.2rem 0.4rem;
    color: var(--gold); letter-spacing: 0.05em;
  }

  /* ── 분석 버튼 ── */
  #analyze-btn {
    display: none;
    width: 100%; margin-top: 1.5rem;
    padding: 1rem; background: var(--gold);
    border: none; color: #000;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem; font-weight: 300;
    letter-spacing: 0.15em; cursor: pointer;
    border-radius: 2px; transition: all 0.3s;
  }
  #analyze-btn:hover { background: var(--gold-light); }
  #analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 진행 바 ── */
  #progress-area { display: none; margin-top: 1.5rem; }
  .progress-bar-bg {
    background: var(--surface2); border-radius: 2px;
    height: 3px; overflow: hidden; margin-bottom: 0.8rem;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold);
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-status { font-size: 0.8rem; color: var(--text-muted); text-align: center; }

  /* ── 결과 카드 ── */
  #result-area { display: none; margin-top: 2rem; }
  .result-header {
    display: flex; align-items: center; gap: 1.5rem;
    padding: 1.5rem;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    margin-bottom: 1.5rem;
  }
  .match-pct {
    font-family: 'Noto Serif KR', serif;
    font-size: 3rem; font-weight: 200;
    color: var(--gold); line-height: 1;
    min-width: 90px; text-align: center;
  }
  .match-pct span { font-size: 1.2rem; }
  .match-info h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.4rem; font-weight: 300;
    margin-bottom: 0.2rem;
  }
  .match-info .en-name { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .match-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .badge {
    font-size: 0.68rem; padding: 0.2rem 0.6rem;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px; color: var(--gold);
    letter-spacing: 0.05em;
  }

  .result-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .result-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1.2rem;
  }
  .result-card h3 {
    font-size: 0.72rem; color: var(--gold);
    letter-spacing: 0.12em; margin-bottom: 0.8rem;
    font-weight: 400;
  }
  .result-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
  .result-card ul { list-style: none; }
  .result-card ul li {
    font-size: 0.82rem; color: var(--text-muted);
    padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-left: 1rem; position: relative;
  }
  .result-card ul li::before {
    content: '—'; position: absolute; left: 0;
    color: var(--gold); font-size: 0.7rem;
  }

  /* ── 프레임 점수 ── */
  .frame-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .frame-score-item {
    background: var(--surface2); border-radius: 3px; padding: 0.8rem;
  }
  .frame-score-label { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .frame-score-bar {
    background: var(--border); border-radius: 1px;
    height: 2px; margin-bottom: 0.3rem; overflow: hidden;
  }
  .frame-score-fill { height: 100%; background: var(--gold); }
  .frame-score-num { font-size: 0.8rem; color: var(--gold); }
  .frame-score-comment { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; line-height: 1.4; }

  /* ── 유사 선수 ── */
  .similar-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .similar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.8rem;
    background: var(--surface2); border-radius: 3px;
  }
  .similar-name { font-size: 0.82rem; }
  .similar-tour { font-size: 0.68rem; color: var(--text-muted); }
  .similar-pct { font-size: 0.9rem; color: var(--gold); font-weight: 500; }

  /* ── 저장 버튼 ── */
  #save-btn {
    width: 100%; padding: 0.8rem;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); font-size: 0.85rem;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.08em; transition: all 0.2s;
    margin-top: 1rem;
  }
  #save-btn:hover { background: rgba(201,168,76,0.1); }

  /* ── 히스토리 탭 ── */
  #history-tab { display: none; }
  .history-empty {
    text-align: center; padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .history-empty .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .history-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .history-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.2s;
  }
  .history-item:hover { border-color: rgba(201,168,76,0.3); }
  .history-date { font-size: 0.72rem; color: var(--text-muted); }
  .history-pro { font-size: 0.9rem; margin-top: 0.2rem; }
  .history-pct { font-size: 1.2rem; color: var(--gold); font-weight: 300; }

  /* ── 그래프 탭 ── */
  #graph-tab { display: none; }
  .graph-wrap {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .graph-title {
    font-size: 0.72rem; color: var(--gold);
    letter-spacing: 0.12em; margin-bottom: 1rem;
  }
  canvas { max-height: 200px; }

  /* ── 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem; width: 360px;
    max-width: 90vw;
  }
  .modal h2 {
    font-family: 'Noto Serif KR', serif;
    font-weight: 300; font-size: 1.2rem;
    margin-bottom: 0.3rem; color: var(--gold);
  }
  .modal p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
  .modal-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-tab {
    background: none; border: none; color: var(--text-muted);
    padding: 0.6rem 1rem; font-size: 0.8rem;
    cursor: pointer; font-family: 'Pretendard', sans-serif;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s;
  }
  .modal-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
  .form-group input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    padding: 0.6rem 0.8rem; font-size: 0.85rem;
    border-radius: 2px; font-family: 'Pretendard', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--gold); }
  .btn-full {
    width: 100%; padding: 0.8rem;
    background: var(--gold); border: none;
    color: #000; font-size: 0.85rem;
    font-family: 'Pretendard', sans-serif; font-weight: 500;
    cursor: pointer; border-radius: 2px; transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-full:hover { background: var(--gold-light); }
  .btn-google {
    width: 100%; padding: 0.75rem;
    background: #fff; border: 1px solid #ddd;
    color: #333; font-size: 0.85rem;
    font-family: 'Pretendard', sans-serif; font-weight: 500;
    cursor: pointer; border-radius: 2px;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    transition: all 0.2s; margin-bottom: 1rem;
  }
  .btn-google:hover { background: #f5f5f5; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .divider {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
  .modal-error { font-size: 0.78rem; color: var(--red); margin-top: 0.8rem; display: none; }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: var(--text-muted);
    font-size: 1.2rem; cursor: pointer;
  }

  /* ── 로그인 유도 배너 ── */
  .login-prompt {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px; padding: 1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap; gap: 0.5rem;
  }
  .login-prompt p { font-size: 0.82rem; color: var(--text-muted); }
  .login-prompt strong { color: var(--gold); }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .main { padding: 1rem; }
    header { padding: 1rem; }
    .result-grid { grid-template-columns: 1fr; }
    .frame-scores { grid-template-columns: 1fr; }
    .result-header { flex-direction: column; text-align: center; }
    .match-pct { font-size: 2.5rem; }
    .tab-btn { padding: 0.7rem 0.8rem; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<!-- 광고 배경 -->
<div id="ad-bg">
  <!-- 광고 슬롯 (PC / 모바일 분리) -->
  <div class="ad-slide desktop-only active" data-slot="pc-1">
    <img src="https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?w=1920&q=80" alt="">
  </div>
  <div class="ad-slide desktop-only" data-slot="pc-2">
    <img src="https://images.unsplash.com/photo-1535131749006-b7f58c99034b?w=1920&q=80" alt="">
  </div>
  <div class="ad-slide desktop-only" data-slot="pc-3">
    <img src="https://images.unsplash.com/photo-1593111774240-d529f12cf4d3?w=1920&q=80" alt="">
  </div>
  <div class="ad-slide desktop-only" data-slot="pc-4">
    <img src="https://images.unsplash.com/photo-1561392806-85aeedbecfe9?w=1920&q=80" alt="">
  </div>
  <div class="ad-slide mobile-only active" data-slot="mo-1">
    <img src="https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?w=800&q=80" alt="">
  </div>
  <div class="ad-slide mobile-only" data-slot="mo-2">
    <img src="https://images.unsplash.com/photo-1535131749006-b7f58c99034b?w=800&q=80" alt="">
  </div>
</div>
<div id="ad-overlay"></div>
<span id="ad-label">AD</span>

<div id="app">
  <header>
    <a href="index.html" class="logo">SWINGMATCH</a>
    <div class="header-right">
      <span id="user-email" style="display:none"></span>
      <button class="btn-ghost" id="login-btn" onclick="openModal()">로그인 / 가입</button>
      <button class="btn-gold" id="logout-btn" style="display:none" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="tab-nav" id="tab-nav">
    <button class="tab-btn active" onclick="showTab('analyze')">스윙 분석</button>
    <button class="tab-btn" onclick="showTab('history')">분석 히스토리</button>
    <button class="tab-btn" onclick="showTab('graph')">개선 그래프</button>
  </div>

  <div class="main">

    <!-- ── 분석 탭 ── -->
    <div id="analyze-tab">
      <div id="login-prompt-banner" class="login-prompt" style="display:none">
        <p>로그인하면 분석 결과가 <strong>자동 저장</strong>되고 히스토리를 확인할 수 있어요.</p>
        <button class="btn-gold" onclick="openModal()" style="white-space:nowrap">로그인하기</button>
      </div>

      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="video/*,video/mp4,video/quicktime,video/avi">
        <div class="upload-icon">🎬</div>
        <div class="upload-title">골프 스윙 영상을 업로드하세요</div>
        <div class="upload-sub">드래그 앤 드롭 또는 클릭하여 선택</div>
        <div class="upload-formats">MP4 · MOV · AVI</div>
      </div>

      <div id="frames-preview">
        <div class="frames-grid" id="frames-grid"></div>
      </div>

      <button id="analyze-btn" onclick="startAnalysis()">스윙 분석하기</button>

      <div id="progress-area">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-status" id="progress-status">분석 준비 중...</div>
      </div>

      <div id="result-area"></div>
    </div>

    <!-- ── 히스토리 탭 ── -->
    <div id="history-tab">
      <div id="history-content"></div>
    </div>

    <!-- ── 그래프 탭 ── -->
    <div id="graph-tab">
      <div id="graph-content"></div>
    </div>

  </div>
</div>

<!-- 로그인/가입 모달 -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>SwingMatch</h2>
    <p>회원가입 후 분석 히스토리를 무제한 저장하세요</p>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="modal-tab" onclick="switchAuthTab('signup')">회원가입</button>
    </div>
    <!-- 구글 로그인 버튼 -->
    <button class="btn-google" onclick="loginWithGoogle()">

function handleFile(file) {
  if (!file.type.startsWith('video/')) {
    alert('영상 파일(MP4, MOV, AVI)을 업로드해주세요.');
    return;
  }
  extractFrames(file);
}

// ── 프레임 추출 ──
const PHASES = ['어드레스','테이크어웨이','백스윙 탑','다운스윙','임팩트','팔로스루','피니시'];

function extractFrames(file) {
  const video = document.createElement('video');
  video.src = URL.createObjectURL(file);
  video.crossOrigin = 'anonymous';
  video.muted = true;

  video.addEventListener('loadedmetadata', () => {
    const duration = video.duration;
    const count = Math.min(7, Math.max(4, Math.floor(duration * 2)));
    const times = [];
    for (let i = 0; i < count; i++) times.push((duration / (count+1)) * (i+1));

    extractedFrames = [];
    const framesGrid = document.getElementById('frames-grid');
    framesGrid.innerHTML = '';
    document.getElementById('frames-preview').style.display = 'block';

    let idx = 0;
    function captureNext() {
      if (idx >= times.length) {
        document.getElementById('analyze-btn').style.display = 'block';
        return;
      }
      video.currentTime = times[idx];
    }

    video.addEventListener('seeked', () => {
      const canvas = document.createElement('canvas');
      canvas.width = 320; canvas.height = 180;
      canvas.getContext('2d').drawImage(video, 0, 0, 320, 180);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      extractedFrames.push({ dataUrl, phase: PHASES[idx] || `프레임 ${idx+1}` });

      const thumb = document.createElement('div');
      thumb.className = 'frame-thumb';
      thumb.innerHTML = `<img src="${dataUrl}"><div class="frame-label">${PHASES[idx] || '프레임 '+(idx+1)}</div>`;
      framesGrid.appendChild(thumb);

      idx++;
      if (idx < times.length) captureNext();
      else {
        document.getElementById('analyze-btn').style.display = 'block';
        URL.revokeObjectURL(video.src);
      }
    });

    captureNext();
  });
}

    {"phase": "테이크어웨이", "score": 78, "comment": "1문장 분석"},
    {"phase": "백스윙 탑", "score": 75, "comment": "1문장 분석"},
    {"phase": "임팩트", "score": 85, "comment": "1문장 분석"}
  ],
  "similar": [
    {"name": "2번째 유사 선수", "tour": "투어", "pct": 71, "emoji": "🏌️"},
    {"name": "3번째 유사 선수", "tour": "투어", "pct": 65, "emoji": "🏌️"},
    {"name": "4번째 유사 선수", "tour": "투어", "pct": 60, "emoji": "🏌️"}
  ]
}

PGA Tour, LPGA Tour, LIV Golf, KPGA, KLPGA의 실제 선수 중에서 매칭. topMatch matchPct는 65~92 사이.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    clearInterval(interval);
    setProgress(100, '분석 완료!');

    if (!response.ok) throw new Error('API 오류');
    const data = await response.json();
    const text = data.content[0].text;
    const json = JSON.parse(text.replace(/```json|```/g, '').trim());

    lastResult = json;
    renderResult(json);

  } catch (e) {
    clearInterval(interval);
    setProgress(100, '분석 완료!');
    // API 직접 호출 실패 시 백엔드 서버 시도
    await tryBackend(phaseList);
  }

  document.getElementById('analyze-btn').disabled = false;
}

    const json = await res.json();

    renderResult(demo);
  }

    openModal();

  const { error } = await sb.from('swing_analyses').insert({
    user_id: currentUser.id,
    pro_name: lastResult.topMatch.name,
    pro_name_en: lastResult.topMatch.nameEn,
    match_pct: lastResult.topMatch.matchPct,
    tour: lastResult.topMatch.tour,
    avg_score: avg,
    keywords: lastResult.topMatch.keywords,
    strengths: lastResult.topMatch.strengths,
    improvements: lastResult.topMatch.improvements,
    frame_analysis: lastResult.frameAnalysis,
    similar_pros: lastResult.similar,
    created_at: new Date().toISOString()
  });

  if (error) {
    alert('저장 실패: 테이블이 아직 생성되지 않았습니다. Supabase에서 테이블을 먼저 만들어주세요.');
    console.error(error);
  } else {
    document.getElementById('save-btn').textContent = '✅ 저장 완료!';
    document.getElementById('save-btn').disabled = true;
  }
}

  `).join('')}</div>`;
}

// ── 개선 그래프 ──
async function loadGraph() {
  const el = document.getElementById('graph-content');

  if (!currentUser) {
    el.innerHTML = `
      <div class="history-empty">
        <div class="icon">📈</div>
        <p style="margin-bottom:1rem">로그인하면 스윙 개선 그래프를 볼 수 있어요</p>
        <button class="btn-gold" onclick="openModal()">로그인하기</button>
      </div>`;
    return;
  }

  const { data, error } = await sb.from('swing_analyses')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: true });

  if (error || !data || data.length < 2) {
    el.innerHTML = `
      <div class="history-empty">
        <div class="icon">📈</div>
        <p>분석 결과가 2개 이상 쌓이면<br>개선 그래프를 확인할 수 있어요!</p>
      </div>`;
    return;
  }

  const labels = data.map((d,i) => `${i+1}회차`);
  const matchData = data.map(d => d.match_pct);
  const scoreData = data.map(d => d.avg_score);

  el.innerHTML = `
    <div class="graph-wrap">
      <div class="graph-title">프로 매칭률 변화 (%)</div>
      <canvas id="match-chart"></canvas>
    </div>
    <div class="graph-wrap">
      <div class="graph-title">평균 자세 점수 변화</div>
      <canvas id="score-chart"></canvas>
    </div>
  `;

  const chartOpts = {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#2a2a2a' } },
      y: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#2a2a2a' }, min: 50, max: 100 }
    }
  };

  new Chart(document.getElementById('match-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{ data: matchData, borderColor: '#c9a84c', backgroundColor: 'rgba(201,168,76,0.1)', tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#c9a84c' }]
    },
    options: chartOpts
  });

  new Chart(document.getElementById('score-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{ data: scoreData, borderColor: '#4caf7d', backgroundColor: 'rgba(76,175,125,0.1)', tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#4caf7d' }]
    },
    options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, min: 50, max: 100 } } }
  });
}

// ── 광고 롤링 ──
function initAdSlider() {
  const isMobile = window.innerWidth <= 768;
  const slides = document.querySelectorAll(isMobile ? '.ad-slide.mobile-only' : '.ad-slide.desktop-only');
  if (slides.length <= 1) return;
  let cur = 0;
  slides[0].classList.add('active');
  setInterval(() => {
    slides[cur].classList.remove('active');
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add('active');
  }, 4000);
}

// ── 초기화 ──
checkSession();
initAdSlider();
showTab('analyze');

// 구글 로그인 후 세션 감지
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    currentUser = session.user;
    updateUI(true);
    closeModal();
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    updateUI(false);
  }
});
</script>
