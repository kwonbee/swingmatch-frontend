<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>골프 백과사전 | MySwingMatch</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
:root{--gr:#2D4A33;--gr-pale:#4C7857;--ink:#1c1c19;--body:#42413b;--mut:#8a887f;--paper:#f3f2ec;--card:#ffffff;--line:#e8e6dd;--tagbg:#e9f0ea;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);color:var(--body);line-height:1.6;}
.wrap{max-width:430px;margin:0 auto;background:var(--paper);min-height:100vh;}
/* 상단 헤더 */
.navbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;height:52px;padding:0 16px;background:rgba(243,242,236,.92);backdrop-filter:blur(10px);border-bottom:0.5px solid var(--line);}
.navbar a{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink);font-size:14px;font-weight:600;}
.navbar .arrow{font-size:18px;line-height:1;}
.top{padding:18px 20px 14px;text-align:center;}
.top .brand-logo{height:18px;width:auto;display:inline-block;}
.top .desc{font-size:23px;font-weight:600;color:var(--mut);margin-top:2px;margin-bottom:-3px;letter-spacing:-.5px;line-height:1;}
/* 카드 리스트 */
.list{padding:16px;display:flex;flex-direction:column;gap:12px;}
.card{display:flex;align-items:stretch;gap:12px;background:var(--card);border:0.5px solid var(--line);border-radius:16px;padding:16px;text-decoration:none;color:inherit;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(40,50,35,.04);}
.card:active{transform:scale(.985);}
.card.disabled{opacity:.72;}
.thumb.empty{position:relative;background:#e8ece6;backdrop-filter:blur(3px);}
.thumb.empty::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,#e3e8e0 0 7px,#dde3d9 7px 14px);filter:blur(2px);opacity:.7;}
.thumb.empty::after{content:"🔒";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.45;}
.card-body{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.tag{display:inline-block;align-self:flex-start;font-size:10px;font-weight:700;color:var(--gr);background:var(--tagbg);padding:3px 9px;border-radius:20px;letter-spacing:.2px;}
.card-title{font-size:17px;font-weight:700;color:var(--ink);margin-top:9px;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;}
.card-desc{font-size:12.5px;color:var(--mut);margin-top:3px;}
.soon{font-size:9.5px;font-weight:600;color:var(--mut);background:#eceae1;padding:2px 7px;border-radius:10px;letter-spacing:0;}
.thumb{width:84px;height:84px;flex-shrink:0;border-radius:12px;overflow:hidden;background:#e8ece6;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.foot{text-align:center;padding:20px 20px 40px;}
.foot .foot-logo{height:28px;width:auto;opacity:.85;}
.foot .cr{font-size:10px;color:var(--mut);margin-top:6px;}
</style>
</head>
